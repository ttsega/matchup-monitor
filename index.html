<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matchup Monitor — Tournament Ops</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07090f; --bg2: #0d1117; --bg3: #141922; --bg4: #1c2333;
    --border: #1e2a3a; --border2: #2a3a50;
    --text: #c8d6e8; --text-muted: #5a7090; --text-dim: #3a4f65;
    --green: #00e676; --green-dim: #003a1f; --green-mid: #00b854;
    --amber: #ffb300; --amber-dim: #3a2800; --amber-mid: #cc8f00;
    --red: #ff4444; --red-dim: #3a0a0a; --red-mid: #cc2222;
    --blue: #2979ff; --blue-dim: #0a1a3a; --teal: #00bcd4;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'IBM Plex Sans', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 13px; line-height: 1.5; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 48px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-family: var(--font-mono); font-weight: 600; font-size: 13px; color: var(--green); letter-spacing: 2px; text-transform: uppercase; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); display: inline-block; }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .status-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .last-checked { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }

  .controls-bar { display: flex; align-items: center; gap: 12px; padding: 10px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .btn { font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 6px 14px; border-radius: 3px; border: 1px solid; cursor: pointer; transition: all .15s; white-space: nowrap; background: transparent; }
  .btn-primary { border-color: var(--green); color: var(--green); }
  .btn-primary:hover { background: var(--green-dim); }
  .btn-primary.active { background: var(--green); color: #000; }
  .btn-ghost { border-color: var(--border2); color: var(--text-muted); }
  .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-amber { border-color: var(--amber); color: var(--amber); }
  .btn-amber:hover { background: var(--amber-dim); }

  .summary-bar { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .summary-stat { padding: 8px 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; min-width: 115px; cursor: pointer; transition: background .15s; }
  .summary-stat:hover { background: var(--bg3); }
  .summary-stat.stat-active { background: var(--bg4); border-bottom: 2px solid var(--teal); box-shadow: inset 0 0 0 1px var(--teal); }
  .summary-stat.stat-active .s-label { color: var(--teal); }
  .summary-stat.stat-active .s-sub { color: var(--teal); opacity: 0.6; }
  .s-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
  .s-value { font-family: var(--font-mono); font-size: 16px; font-weight: 600; color: var(--text); }
  .s-value.up { color: var(--green); }
  .s-value.down { color: var(--red); }
  .s-sub { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); }

  .filter-clear { font-family: var(--font-mono); font-size: 10px; color: var(--teal); letter-spacing: 1px; cursor: pointer; padding: 4px 10px; display: none; align-items: center; gap: 4px; }
  .filter-clear:hover { color: var(--text); }
  .filter-clear.visible { display: flex; }

  #alert-tray { padding: 0 20px; }
  .alert-item { display: flex; align-items: center; gap: 12px; border-radius: 3px; padding: 8px 14px; margin: 6px 0; font-family: var(--font-mono); font-size: 12px; animation: slideIn .3s ease; }
  .alert-item.signal-alert { background: var(--green-dim); border: 1px solid var(--green-mid); }
  .alert-item.price-spike { background: var(--amber-dim); border: 1px solid var(--amber-mid); }
  .alert-item.price-drop { background: var(--red-dim); border: 1px solid var(--red-mid); }
  @keyframes slideIn { from{transform:translateX(-10px);opacity:0} to{transform:translateX(0);opacity:1} }
  .alert-badge { font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; white-space: nowrap; }
  .alert-text { flex: 1; color: var(--text-muted); }
  .alert-time { color: var(--text-dim); font-size: 10px; }
  .alert-close { color: var(--text-dim); cursor: pointer; font-size: 18px; line-height: 1; margin-left: 4px; }
  .alert-close:hover { color: var(--text); }

  .tabs { display: flex; padding: 0 20px; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab { font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 12px 16px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-dim); transition: all .15s; white-space: nowrap; }
  .tab:hover { color: var(--text-muted); }
  .tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .tab-badge { display: inline-block; margin-left: 6px; padding: 1px 5px; border-radius: 8px; font-size: 9px; font-weight: 600; background: var(--bg4); color: var(--text-muted); vertical-align: middle; }

  .main { padding: 16px 20px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .round-block { margin-bottom: 24px; }
  .round-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .round-label span { color: var(--text-muted); }

  .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 8px; }
  .game-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; transition: border-color .2s; position: relative; }
  .game-card:hover { border-color: var(--border2); }
  .game-card.signal-aggressive { border-left: 3px solid var(--green); }
  .game-card.signal-lean { border-left: 3px solid var(--green-mid); }
  .game-card.signal-backoff { border-left: 3px solid var(--red); }
  .game-card.signal-watch { border-left: 3px solid var(--amber); }
  .game-card.filtered-out { display: none; }

  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .game-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }
  .game-round-tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--teal); }
  .matchup-line { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .team { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .vs-sep { color: var(--text-dim); font-size: 11px; font-weight: 400; }
  .tbd-team { color: var(--amber); }

  .status-badges { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
  .badge { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 7px; border-radius: 2px; font-weight: 500; }
  .badge-aggressive { background: var(--green); color: #000; }
  .badge-lean { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-mid); }
  .badge-hold { background: var(--bg4); color: var(--text-muted); border: 1px solid var(--border); }
  .badge-watch { background: var(--amber-dim); color: var(--amber); border: 1px solid #5a3a00; }
  .badge-backoff { background: var(--red-dim); color: var(--red); border: 1px solid #5a0a0a; }
  .badge-pending { background: var(--bg4); color: var(--text-dim); border: 1px solid var(--border); }
  .badge-tv { background: var(--blue-dim); color: var(--blue); border: 1px solid #1a3a6a; }

  .ticket-block { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px; }
  .ticket-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .ticket-source { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }

  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .metric-cell { background: var(--bg4); border-radius: 3px; padding: 7px 8px; }
  .metric-label { font-family: var(--font-mono); font-size: 8px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
  .metric-value { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .metric-value.pending { color: var(--text-dim); font-size: 10px; }
  .metric-sub { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); margin-top: 2px; }

  .signal-detail { border-top: 1px solid var(--border); margin-top: 8px; padding-top: 8px; }
  .signal-detail-header { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .signal-detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
  .signal-detail-cell { background: var(--bg4); border-radius: 3px; padding: 5px 7px; }
  .signal-detail-label { font-family: var(--font-mono); font-size: 7px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .signal-detail-value { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.2; }

  .aggression-bar { margin-top: 6px; background: var(--bg4); border-radius: 3px; padding: 7px 10px; display: flex; align-items: center; gap: 10px; }
  .aggression-label { font-family: var(--font-mono); font-size: 8px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  .aggression-signal { font-family: var(--font-mono); font-size: 11px; font-weight: 600; }
  .sig-aggressive { color: var(--green); }
  .sig-lean { color: var(--green-mid); }
  .sig-hold { color: var(--text-muted); }
  .sig-watch { color: var(--amber); }
  .sig-backoff { color: var(--red); }
  .sig-pending { color: var(--text-dim); }
  .aggression-reason { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); margin-left: auto; }

  .scan-line { pointer-events: none; position: fixed; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--teal), transparent); animation: scan 3s linear infinite; opacity: 0; transition: opacity .3s; }
  .scan-line.active { opacity: 1; }
  @keyframes scan { from{transform:translateY(0)} to{transform:translateY(100vh)} }

  .activity-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 300px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; transform: translateX(100%); transition: transform .25s; z-index: 200; }
  .activity-panel.open { transform: translateX(0); }
  .activity-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; color: var(--teal); letter-spacing: 2px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
  .activity-close { cursor: pointer; color: var(--text-dim); font-size: 18px; line-height: 1; }
  .activity-close:hover { color: var(--text); }
  .activity-log { flex: 1; overflow-y: auto; padding: 10px 0; }
  .log-entry { padding: 7px 14px; border-bottom: 1px solid var(--border); }
  .log-time { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 2px; }
  .log-msg { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .log-msg.success { color: var(--green-mid); }
  .log-msg.warn { color: var(--amber); }

  .checking-indicator { font-family: var(--font-mono); font-size: 11px; color: var(--teal); letter-spacing: 1px; display: none; align-items: center; gap: 6px; }
  .checking-indicator.visible { display: flex; }
  .spin { display: inline-block; width: 10px; height: 10px; border: 1.5px solid var(--teal); border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  #log-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 190; }
  #log-overlay.open { display: block; }

  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-state-msg { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* HOW IT WORKS panel */
  .hiw-panel { max-width: 900px; margin: 0 auto; }
  .hiw-section { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 20px 24px; margin-bottom: 16px; }
  .hiw-title { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--teal); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
  .hiw-text { font-family: var(--font-sans); font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 12px; }

  .weight-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .weight-bar-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 120px; flex-shrink: 0; }
  .weight-bar-track { flex: 1; height: 22px; background: var(--bg4); border-radius: 3px; overflow: hidden; position: relative; }
  .weight-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 8px; font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: #000; }
  .weight-bar-pct { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); width: 40px; text-align: right; flex-shrink: 0; }

  .weight-toggle { display: flex; gap: 8px; margin-top: 12px; margin-bottom: 4px; }
  .weight-toggle .btn { font-size: 10px; padding: 4px 10px; }

  .tier-scale { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .tier-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 3px; background: var(--bg4); transition: all .2s; }
  .tier-row.tier-active { transform: scale(1.02); box-shadow: 0 0 12px rgba(0,0,0,.3); }
  .tier-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .tier-label { font-family: var(--font-mono); font-size: 12px; font-weight: 600; flex: 1; }
  .tier-range { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }

  .slider-container { margin-top: 12px; display: flex; align-items: center; gap: 12px; }
  .slider-container input[type="range"] { flex: 1; accent-color: var(--teal); }
  .slider-value { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--teal); width: 36px; text-align: center; }

  .round-conf-list { display: flex; flex-direction: column; gap: 6px; }
  .round-conf-row { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: var(--bg4); border-radius: 3px; border-left: 3px solid var(--border2); }
  .round-conf-row .rcr-name { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--text); width: 130px; flex-shrink: 0; }
  .round-conf-row .rcr-thresh { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--teal); width: 40px; }
  .round-conf-row .rcr-reason { font-family: var(--font-sans); font-size: 11px; color: var(--text-dim); }

  .upset-table { width: 100%; border-collapse: collapse; }
  .upset-table th { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  .upset-table td { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); padding: 6px 10px; border-bottom: 1px solid var(--border); }
  .upset-table tr:last-child td { border-bottom: none; }
  .upset-table .upset-pct { color: var(--amber); font-weight: 600; }
  .upset-table .upset-bonus { color: var(--green); font-weight: 600; }

  .kalshi-bonus-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .kalshi-bonus-card { background: var(--bg4); border-radius: 3px; padding: 12px 14px; text-align: center; }
  .kalshi-bonus-round { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .kalshi-bonus-value { font-family: var(--font-mono); font-size: 20px; font-weight: 600; color: var(--green); }

  /* Composite bar + sparkline on game cards */
  .card-bars { margin-bottom: 8px; animation: barFadeIn .4s ease; }
  @keyframes barFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .comp-bar-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .comp-bar-track { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .comp-bar-fill { height: 100%; border-radius: 3px; transition: width .3s ease; }
  .comp-bar-val { font-family: var(--font-mono); font-size: 9px; font-weight: 600; width: 28px; text-align: right; flex-shrink: 0; }
  .sparkline-wrap { display: flex; align-items: center; gap: 4px; }
  .sparkline-wrap svg { flex: 1; display: block; }
  .sparkline-label { font-family: var(--font-mono); font-size: 8px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; }

  /* SIGNALS leaderboard tab */
  .signals-panel { max-width: 900px; margin: 0 auto; }
  .sig-panel-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .sig-pill { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 12px; border-radius: 14px; border: 1px solid var(--border2); color: var(--text-muted); cursor: pointer; transition: all .15s; background: transparent; white-space: nowrap; }
  .sig-pill:hover { border-color: var(--text-muted); color: var(--text); }
  .sig-pill.pill-active { background: var(--teal); color: #000; border-color: var(--teal); }
  .sig-pill .pill-badge { display: inline-block; margin-left: 4px; padding: 0 4px; border-radius: 6px; font-size: 9px; font-weight: 600; background: rgba(255,255,255,.15); }
  .sig-pill.pill-active .pill-badge { background: rgba(0,0,0,.2); }
  .sig-sort-controls { margin-left: auto; display: flex; gap: 4px; }
  .sig-sort-btn { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--border2); color: var(--text-dim); cursor: pointer; transition: all .12s; background: transparent; }
  .sig-sort-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .sig-sort-btn.sort-active { border-color: var(--teal); color: var(--teal); }
  .sig-section { margin-bottom: 20px; }
  .sig-empty { text-align: center; padding: 30px 20px; font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }

  .sig-row-group { margin-bottom: 3px; }
  .sig-expanded { background: var(--bg2); border: 1px solid var(--teal); border-top: none; border-radius: 0 0 3px 3px; padding: 14px 16px; animation: barFadeIn .2s ease; }
  .sig-row-group .sig-row { border-radius: 3px 3px 0 0; }
  .sig-row-group:not(.sig-open) .sig-row { border-radius: 3px; }
  .sig-row-group.sig-open .sig-row { border-color: var(--teal); border-bottom-color: var(--border); background: var(--bg4); }
  .sig-exp-matchup { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .sig-exp-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-bottom: 10px; }
  .sig-exp-badge-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .sig-exp-badge-row .badge { font-size: 11px; padding: 3px 10px; }
  .sig-exp-sparkline { margin-bottom: 10px; }
  .sig-exp-scores { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .sig-exp-score-row { display: flex; align-items: center; gap: 8px; }
  .sig-exp-score-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; width: 70px; flex-shrink: 0; }
  .sig-exp-score-track { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .sig-exp-score-fill { height: 100%; border-radius: 3px; }

  /* SESSIONS tab */

  .session-card:hover { border-color: var(--border2); background: #1e2940; }

  .session-card-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 8px; }

  .session-card-signal-row .badge { font-size: 11px; padding: 3px 10px; }
  .session-card-comp { display: flex; align-items: center; gap: 8px; }
  .session-card-comp-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; max-width: 140px; }
  .session-card-comp-fill { height: 100%; border-radius: 3px; }
  .session-card-comp-val { font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
  .session-diverge { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.5px; color: var(--amber); background: var(--amber-dim); border: 1px solid #5a3a00; border-radius: 2px; padding: 2px 7px; margin-top: 4px; cursor: help; }
  .session-expanded { background: var(--bg2); border: 1px solid var(--teal); border-top: none; border-radius: 0 0 4px 4px; padding: 12px 14px; animation: barFadeIn .2s ease; }
  .session-card.sess-open { border-radius: 4px 4px 0 0; border-color: var(--teal); border-bottom-color: var(--border); }

  .sess-game-time { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); width: 68px; flex-shrink: 0; text-align: right; }

  .sess-game-bar-track { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
  .sess-game-bar-fill { height: 100%; border-radius: 2px; }

  @media (max-width: 840px) { .sessions-grid { grid-template-columns: 1fr; } }
</style>

<body>

<!-- PASSWORD GATE -->
<div id="pw-gate" style="position:fixed;inset:0;background:#07090f;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="text-align:center;">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#00e676;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;">&#9656; Matchup Monitor</div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#3a4f65;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">Access Code</div>
    <input id="pw-input" type="password" placeholder="enter code"
      style="font-family:'IBM Plex Mono',monospace;font-size:13px;background:#0d1117;border:1px solid #2a3a50;color:#c8d6e8;padding:10px 16px;border-radius:3px;outline:none;width:220px;text-align:center;letter-spacing:2px;"
      onkeydown="if(event.key==='Enter')checkPW()" />
    <div style="margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#3a0a0a;letter-spacing:1px;" id="pw-error"></div>
    <div style="margin-top:16px;">
      <button onclick="checkPW()"
        style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:8px 24px;border-radius:3px;border:1px solid #00e676;color:#00e676;background:transparent;cursor:pointer;">
        ENTER
      </button>
    </div>
  </div>
</div>

<div class="scan-line" id="scan-line"></div>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">&#9656; Matchup Monitor</span>
    <span class="status-dot" id="status-dot"></span>
    <span class="status-label" id="status-label">CONNECTING</span>
  </div>
  <div class="topbar-right">
    <span class="checking-indicator" id="checking-indicator"><span class="spin"></span>SCANNING...</span>
    <span class="last-checked" id="last-checked">&mdash;</span>
    <button class="btn btn-ghost" onclick="toggleLog()">LOG</button>
  </div>
</div>

<div class="controls-bar">
  <button class="btn btn-primary" onclick="triggerScan()" id="scan-btn">MANUAL SCAN</button>
  <button class="btn btn-amber" onclick="triggerPopulate()" id="populate-btn">POPULATE BRACKET</button>
  <span class="filter-clear" id="filter-clear" onclick="clearSignalFilter()">&#215; CLEAR FILTER</span>
  <span style="flex:1"></span>
  <span class="last-checked" id="games-count">&mdash;</span>
</div>

<div class="summary-bar">
  <div class="summary-stat" id="stat-total" onclick="filterBySignal('total')"><span class="s-label">Total Games</span><span class="s-value" id="sum-total">&mdash;</span><span class="s-sub">NCAA Tournament</span></div>
  <div class="summary-stat" id="stat-priced" onclick="filterBySignal('priced')"><span class="s-label">With Pricing</span><span class="s-value up" id="sum-priced">0</span><span class="s-sub">have ticket data</span></div>
  <div class="summary-stat" id="stat-aggressive" onclick="filterBySignal('aggressive')"><span class="s-label">Aggressive</span><span class="s-value up" id="sum-aggressive">0</span><span class="s-sub">lean in + get aggressive</span></div>
  <div class="summary-stat" id="stat-caution" onclick="filterBySignal('caution')"><span class="s-label">Watch / Back Off</span><span class="s-value down" id="sum-caution">0</span><span class="s-sub">caution signals</span></div>
  <div class="summary-stat"><span class="s-label">WebSocket</span><span class="s-value" id="sum-ws">&#9679;</span><span class="s-sub" id="sum-ws-label">connecting</span></div>
</div>

<div id="alert-tray"></div>

<div class="tabs" id="tabs-container"></div>

<div class="main" id="main-container"></div>

<div id="log-overlay" onclick="toggleLog()"></div>
<div class="activity-panel" id="activity-panel">
  <div class="activity-header">Activity Log <span class="activity-close" onclick="toggleLog()">&#215;</span></div>
  <div class="activity-log" id="activity-log">
    <div class="log-entry"><div class="log-msg">Dashboard initialized.</div></div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const ACCESS_PW = "marchmadness26";
const API_BASE = "https://matchup-monitor-backend-production.up.railway.app";

function checkPW() {
  const val = document.getElementById("pw-input").value;
  if (val === ACCESS_PW) {
    document.getElementById("pw-gate").style.display = "none";
    init();
  } else {
    const err = document.getElementById("pw-error");
    err.textContent = "INCORRECT CODE";
    err.style.color = "#ff4444";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-input").focus();
  }
}

// ── State ──
const state = {
  games: {},       // gameId -> latest row from /games
  signals: {},     // gameId -> latest signal
  activeTab: null,
  activeFilter: null, // null | 'total' | 'priced' | 'aggressive' | 'caution'
  socket: null,
};

// ── Signal config ──
const SIGNAL_CONFIG = {
  GET_AGGRESSIVE: { label: "GET AGGRESSIVE", cls: "sig-aggressive", badge: "badge-aggressive", card: "signal-aggressive" },
  LEAN_IN:        { label: "LEAN IN",        cls: "sig-lean",       badge: "badge-lean",       card: "signal-lean" },
  HOLD:           { label: "HOLD",           cls: "sig-hold",       badge: "badge-hold",       card: "" },
  WATCH:          { label: "WATCH",          cls: "sig-watch",      badge: "badge-watch",      card: "signal-watch" },
  BACK_OFF:       { label: "BACK OFF",       cls: "sig-backoff",    badge: "badge-backoff",    card: "signal-backoff" },
};

// ── API ──
async function fetchGames() {
  const resp = await fetch(API_BASE + "/games");
  if (!resp.ok) throw new Error("GET /games failed: " + resp.status);
  return resp.json();
}

async function fetchSignals() {
  const resp = await fetch(API_BASE + "/signals");
  if (!resp.ok) throw new Error("GET /signals failed: " + resp.status);
  return resp.json();
}

async function triggerScan() {
  const btn = document.getElementById("scan-btn");
  const indicator = document.getElementById("checking-indicator");
  btn.disabled = true; btn.textContent = "SCANNING...";
  indicator.classList.add("visible");
  addLog("Manual scan triggered...");
  try {
    const resp = await fetch(API_BASE + "/health/scan", { method: "POST", headers: { "x-admin-secret": ACCESS_PW } });
    const data = await resp.json();
    if (resp.ok) {
      addLog("Scan complete: " + data.gamesScanned + " games in " + data.elapsedMs + "ms", "success");
      await loadData();
    } else {
      addLog("Scan failed: " + (data.error || resp.status), "warn");
    }
  } catch (e) { addLog("Scan error: " + e.message, "warn"); }
  finally { btn.disabled = false; btn.textContent = "MANUAL SCAN"; indicator.classList.remove("visible"); }
}

async function triggerPopulate() {
  const btn = document.getElementById("populate-btn");
  btn.disabled = true; btn.textContent = "POPULATING...";
  addLog("Populating tournament bracket from ESPN...");
  try {
    const resp = await fetch(API_BASE + "/admin/populate-tournament", { method: "POST", headers: { "x-admin-secret": ACCESS_PW } });
    const data = await resp.json();
    if (resp.ok) {
      addLog("Populate done: " + data.inserted + " inserted, " + data.updated + " updated", "success");
      await loadData();
    } else {
      addLog("Populate failed: " + (data.error || resp.status), "warn");
    }
  } catch (e) { addLog("Populate error: " + e.message, "warn"); }
  finally { btn.disabled = false; btn.textContent = "POPULATE BRACKET"; }
}

// ── WebSocket ──
function connectWS() {
  const socket = io(API_BASE, { transports: ["websocket", "polling"] });
  state.socket = socket;

  socket.on("connect", () => {
    document.getElementById("status-dot").classList.add("live");
    document.getElementById("status-label").textContent = "LIVE";
    document.getElementById("scan-line").classList.add("active");
    document.getElementById("sum-ws").style.color = "var(--green)";
    document.getElementById("sum-ws-label").textContent = "connected";
    addLog("WebSocket connected", "success");
  });

  socket.on("disconnect", () => {
    document.getElementById("status-dot").classList.remove("live");
    document.getElementById("status-label").textContent = "DISCONNECTED";
    document.getElementById("scan-line").classList.remove("active");
    document.getElementById("sum-ws").style.color = "var(--red)";
    document.getElementById("sum-ws-label").textContent = "disconnected";
    addLog("WebSocket disconnected", "warn");
  });

  socket.on("snapshot:new", (snapshot) => {
    const id = snapshot.gameId || snapshot.game_id;
    if (!id) return;
    state.games[id] = normalizeGame(snapshot);
    rerenderCard(id);
    updateSummary();
    document.getElementById("last-checked").textContent = "Updated: " + new Date().toLocaleTimeString();
  });

  socket.on("signal:new", (data) => {
    const id = data.gameId || data.game_id;
    if (!id) return;
    const normSig = normalizeSignal(data);
    state.signals[id] = normSig;
    // Append to signal history
    if (!window._signalHistory) window._signalHistory = {};
    if (!window._signalHistory[id]) window._signalHistory[id] = [];
    window._signalHistory[id].push({ composite: normSig.composite, firedAt: normSig.firedAt });
    rerenderCard(id);
    updateSummary();
    const sig = SIGNAL_CONFIG[data.signal] || SIGNAL_CONFIG.HOLD;
    const game = state.games[id];
    const label = game ? game.game : id;
    if (data.signal === "GET_AGGRESSIVE" || data.signal === "LEAN_IN") {
      pushAlert(sig.label + ": " + label, "signal-alert", sig.label);
    }
    addLog("Signal " + sig.label + " for " + label + " (composite: " + (data.composite || 0).toFixed(2) + ")", "success");
  });
}

// ── Normalize DB rows (snake_case) to camelCase ──
function normalizeGame(row) {
  return {
    gameId: row.gameId || row.game_id,
    tournament: row.tournament,
    game: row.game,
    gameTime: row.gameTime || row.game_time,
    minutesToGame: row.minutesToGame ?? row.minutes_to_game,
    getIn: row.getIn ?? row.get_in ?? null,
    avgListing: row.avgListing ?? row.avg_listing ?? null,
    listingCount: row.listingCount ?? row.listing_count ?? null,
    faceValue: row.faceValue ?? row.face_value ?? null,
    homeProbability: row.homeProbability ?? row.home_probability ?? null,
    awayProbability: row.awayProbability ?? row.away_probability ?? null,
    isNationalTV: row.isNationalTV ?? row.is_national_tv ?? false,
    googleTrend: row.googleTrend ?? row.google_trend ?? null,
    venueName: row.venueName ?? row.venue_name ?? null,
    venueCity: row.venueCity ?? row.venue_city ?? null,
    seatgeekUrl: row.seatgeekUrl ?? row.seatgeek_url ?? null,
  };
}

function normalizeSignal(row) {
  return {
    signal: row.signal,
    composite: row.composite,
    confidence: row.confidence,
    ticketScore: row.ticketScore ?? row.ticket_score ?? null,
    oddsScore: row.oddsScore ?? row.odds_score ?? null,
    kalshiScore: row.kalshiScore ?? row.kalshi_score ?? null,
    contextScore: row.contextScore ?? row.context_score ?? null,
    narrative: row.narrative ?? null,
    firedAt: row.firedAt || row.fired_at,
  };
}

// ── Load initial data ──
async function loadData() {
  try {
    const [games, signals] = await Promise.all([fetchGames(), fetchSignals()]);
    state.games = {};
    games.forEach(g => { const n = normalizeGame(g); state.games[n.gameId] = n; });
    // Build signal history map and track latest per game
    state.signals = {};
    window._signalHistory = {};
    signals.forEach(s => {
      const id = s.game_id || s.gameId;
      const norm = normalizeSignal(s);
      if (!window._signalHistory[id]) window._signalHistory[id] = [];
      window._signalHistory[id].push({ composite: norm.composite, firedAt: norm.firedAt });
      if (!state.signals[id] || new Date(norm.firedAt) >= new Date(state.signals[id].firedAt)) {
        state.signals[id] = norm;
      }
    });
    // Sort each history by firedAt ascending
    Object.values(window._signalHistory).forEach(arr => {
      arr.sort((a, b) => new Date(a.firedAt) - new Date(b.firedAt));
    });
    document.getElementById("last-checked").textContent = "Loaded: " + new Date().toLocaleTimeString();
    addLog("Loaded " + games.length + " games, " + signals.length + " signals", "success");
    renderAll();
  } catch (e) {
    addLog("Failed to load data: " + e.message, "warn");
  }
}

// ── Grouping: by date instead of tournament round ──
function getDateKey(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", timeZone: "America/New_York" });
}

function getAllDateGroups() {
  const groups = {};
  Object.values(state.games).forEach(g => {
    const key = getDateKey(g.gameTime);
    if (!groups[key]) groups[key] = [];
    groups[key].push(g);
  });
  Object.values(groups).forEach(arr => arr.sort((a, b) => new Date(a.gameTime) - new Date(b.gameTime)));
  const sorted = Object.entries(groups).sort((a, b) => {
    const ta = Math.min(...a[1].map(g => new Date(g.gameTime).getTime()));
    const tb = Math.min(...b[1].map(g => new Date(g.gameTime).getTime()));
    return ta - tb;
  });
  return sorted;
}

function isGroupCompleted(games) {
  return games.every(g => {
    const mtg = g.minutesToGame;
    if (mtg != null && mtg < 0) return true;
    return new Date(g.gameTime).getTime() < Date.now();
  });
}

function getDateGroups() {
  return getAllDateGroups().filter(([, games]) => !isGroupCompleted(games));
}

// ── Signal filter ──
function filterBySignal(type) {
  if (type === "total" || state.activeFilter === type) {
    clearSignalFilter();
    return;
  }
  state.activeFilter = type;
  document.querySelectorAll(".summary-stat").forEach(el => el.classList.remove("stat-active"));
  const statEl = document.getElementById("stat-" + type);
  if (statEl) statEl.classList.add("stat-active");
  document.getElementById("filter-clear").classList.add("visible");
  applyFilter();
}

function clearSignalFilter() {
  state.activeFilter = null;
  document.querySelectorAll(".summary-stat").forEach(el => el.classList.remove("stat-active"));
  document.getElementById("filter-clear").classList.remove("visible");
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll(".game-card").forEach(card => {
    const gid = card.id.replace("card-", "");
    const g = state.games[gid];
    const sig = state.signals[gid];
    let show = true;
    if (state.activeFilter === "priced") {
      show = g && g.getIn != null;
    } else if (state.activeFilter === "aggressive") {
      show = sig && (sig.signal === "GET_AGGRESSIVE" || sig.signal === "LEAN_IN");
    } else if (state.activeFilter === "caution") {
      show = sig && (sig.signal === "WATCH" || sig.signal === "BACK_OFF");
    }
    card.classList.toggle("filtered-out", !show);
  });
}

// ── Rendering ──
function renderAll() {
  const allDateGroups = getAllDateGroups();
  const dateGroups = getDateGroups();
  const tabsEl = document.getElementById("tabs-container");
  const mainEl = document.getElementById("main-container");
  tabsEl.innerHTML = "";
  mainEl.innerHTML = "";

  if (allDateGroups.length === 0) {
    mainEl.innerHTML = '<div class="empty-state"><div class="empty-state-msg">No games loaded. Click POPULATE BRACKET to fetch the NCAA tournament from ESPN.</div></div>';
    return;
  }

  // ALL tab (only if there are multiple active date groups)
  if (dateGroups.length > 1) {
    const allTab = document.createElement("div");
    allTab.className = "tab" + (state.activeTab === "__all" ? " active" : "");
    allTab.textContent = "ALL";
    const allBadge = document.createElement("span");
    allBadge.className = "tab-badge";
    allBadge.textContent = Object.keys(state.games).length;
    allTab.appendChild(allBadge);
    allTab.onclick = () => switchTab("__all");
    tabsEl.appendChild(allTab);
  }

  // Tab per active date
  dateGroups.forEach(([dateLabel, games]) => {
    const tab = document.createElement("div");
    tab.className = "tab" + (state.activeTab === dateLabel ? " active" : "");
    tab.innerHTML = dateLabel + ' <span class="tab-badge">' + games.length + "</span>";
    tab.dataset.tabKey = dateLabel;
    tab.onclick = () => switchTab(dateLabel);
    tabsEl.appendChild(tab);
  });

  // SIGNALS tab
  const sigTab = document.createElement("div");
  sigTab.className = "tab" + (state.activeTab === "__signals" ? " active" : "");
  const sigCount = Object.keys(state.signals).length;
  sigTab.innerHTML = 'SIGNALS <span class="tab-badge">' + sigCount + '</span>';
  sigTab.onclick = () => switchTab("__signals");
  tabsEl.appendChild(sigTab);

  // SESSIONS tab
  const sessionGroups = buildSessionGroups(Object.values(state.games), state.signals);
  const todayKey = new Date().toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", timeZone: "America/New_York" });
  const todaySessionCount = sessionGroups.filter(s => s.dateKey === todayKey).length;
  const sessTab = document.createElement("div");
  sessTab.className = "tab" + (state.activeTab === "__sessions" ? " active" : "");
  sessTab.innerHTML = 'SESSIONS <span class="tab-badge">' + todaySessionCount + '</span>';
  sessTab.onclick = () => switchTab("__sessions");
  tabsEl.appendChild(sessTab);

  // HOW IT WORKS tab
  const hiwTab = document.createElement("div");
  hiwTab.className = "tab" + (state.activeTab === "__hiw" ? " active" : "");
  hiwTab.textContent = "HOW IT WORKS";
  hiwTab.onclick = () => switchTab("__hiw");
  tabsEl.appendChild(hiwTab);

  // Panels
  // ALL panel — includes all date groups (even completed)
  if (dateGroups.length > 1) {
    const allPanel = document.createElement("div");
    allPanel.className = "panel" + (state.activeTab === "__all" ? " active" : "");
    allPanel.id = "panel-__all";
    allDateGroups.forEach(([dateLabel, games]) => {
      allPanel.appendChild(buildRoundBlock(dateLabel, games));
    });
    mainEl.appendChild(allPanel);
  }

  // Per-date panels (active dates only)
  dateGroups.forEach(([dateLabel, games]) => {
    const panel = document.createElement("div");
    panel.className = "panel" + (state.activeTab === dateLabel ? " active" : "");
    panel.id = "panel-" + dateLabel;
    panel.appendChild(buildRoundBlock(dateLabel, games));
    mainEl.appendChild(panel);
  });

  // SIGNALS panel
  const sigPanel = document.createElement("div");
  sigPanel.className = "panel" + (state.activeTab === "__signals" ? " active" : "");
  sigPanel.id = "panel-__signals";
  sigPanel.innerHTML = buildSignalsPanel();
  mainEl.appendChild(sigPanel);

  // SESSIONS panel
  const sessPanel = document.createElement("div");
  sessPanel.className = "panel" + (state.activeTab === "__sessions" ? " active" : "");
  sessPanel.id = "panel-__sessions";
  sessPanel.innerHTML = buildSessionsPanel(sessionGroups);
  mainEl.appendChild(sessPanel);

  // HOW IT WORKS panel
  const hiwPanel = document.createElement("div");
  hiwPanel.className = "panel" + (state.activeTab === "__hiw" ? " active" : "");
  hiwPanel.id = "panel-__hiw";
  hiwPanel.innerHTML = buildHowItWorks();
  mainEl.appendChild(hiwPanel);

  updateSummary();
  if (state.activeFilter) applyFilter();

  // On first load, activate the ALL tab by default
  if (state.activeTab === null) {
    switchTab("__all");
  }
}

function buildRoundBlock(label, games) {
  const block = document.createElement("div");
  block.className = "round-block";
  const hdr = document.createElement("div");
  hdr.className = "round-label";
  hdr.innerHTML = "<span>" + label + "</span> &mdash; " + games.length + " games";
  block.appendChild(hdr);
  const grid = document.createElement("div");
  grid.className = "games-grid";
  games.forEach(g => grid.appendChild(buildGameCard(g)));
  block.appendChild(grid);
  return block;
}

function fmtPrice(v) { return v != null ? "$" + Number(v).toFixed(0) : "&mdash;"; }
function fmtPct(v) { return v != null ? (v * 100).toFixed(0) + "%" : "&mdash;"; }
function fmtScore(v) { return v != null ? Number(v).toFixed(2) : "&mdash;"; }
function fmtMinutes(m) {
  if (m == null) return "&mdash;";
  if (m < 0) return "LIVE / FINAL";
  if (m < 60) return Math.round(m) + " min";
  if (m < 1440) return (m / 60).toFixed(1) + " hrs";
  return Math.round(m / 1440) + " days";
}

const COMPOSITE_COLORS = {
  GET_AGGRESSIVE: "#ff4444",
  LEAN_IN: "#ff8c00",
  HOLD: "#f0c040",
  WATCH: "#00bcd4",
  BACK_OFF: "#444",
};

function buildSparkline(gameId, color) {
  var history = (window._signalHistory && window._signalHistory[gameId]) || [];
  var w = 200, h = 28, pad = 3;
  if (history.length === 0) {
    return '<div class="sparkline-wrap"><svg width="100%" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none"></svg><span class="sparkline-label">TREND</span></div>';
  }
  if (history.length === 1) {
    var midY = Math.round(h / 2);
    return '<div class="sparkline-wrap"><svg width="100%" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
      '<line x1="' + pad + '" y1="' + midY + '" x2="' + (w - pad) + '" y2="' + midY + '" stroke="' + color + '" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>' +
      '<circle cx="' + (w - pad) + '" cy="' + midY + '" r="2.5" fill="' + color + '"/>' +
    '</svg><span class="sparkline-label">TREND</span></div>';
  }
  // Dynamic Y scale: min/max of actual data with 10% padding
  var vals = history.map(function(pt) { return pt.composite != null ? pt.composite : 0; });
  var dataMin = Math.min.apply(null, vals);
  var dataMax = Math.max.apply(null, vals);
  var range = dataMax - dataMin;
  if (range < 0.01) range = 0.1; // prevent flat line when all values near-identical
  var yPad = range * 0.1;
  var yMin = dataMin - yPad;
  var yMax = dataMax + yPad;
  var yRange = yMax - yMin;
  var drawH = h - pad * 2;

  var n = history.length;
  var xStep = (w - pad * 2) / (n - 1);
  var pointStrs = [];
  for (var i = 0; i < n; i++) {
    var x = pad + i * xStep;
    var normalized = (vals[i] - yMin) / yRange;
    var y = h - pad - (normalized * drawH);
    pointStrs.push(x.toFixed(1) + "," + y.toFixed(1));
  }
  var lastX = pad + (n - 1) * xStep;
  var lastNorm = (vals[n - 1] - yMin) / yRange;
  var lastY = h - pad - (lastNorm * drawH);
  return '<div class="sparkline-wrap"><svg width="100%" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
    '<polyline points="' + pointStrs.join(" ") + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>' +
    '<circle cx="' + lastX.toFixed(1) + '" cy="' + lastY.toFixed(1) + '" r="2.5" fill="' + color + '"/>' +
  '</svg><span class="sparkline-label">TREND</span></div>';
}

function buildCardBars(sig, gameId) {
  const barColor = sig ? (COMPOSITE_COLORS[sig.signal] || "#444") : "#444";
  if (!sig) {
    return '<div class="card-bars">' +
      '<div class="comp-bar-wrap"><div class="comp-bar-track"><div class="comp-bar-fill" style="width:0%;background:#444"></div></div><span class="comp-bar-val" style="color:#444">&ndash;</span></div>' +
      buildSparkline(gameId, "#444") +
    '</div>';
  }
  const comp = sig.composite != null ? sig.composite : 0;
  const pct = Math.min(Math.max(comp * 100, 0), 100);
  return '<div class="card-bars">' +
    '<div class="comp-bar-wrap"><div class="comp-bar-track"><div class="comp-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div><span class="comp-bar-val" style="color:' + barColor + '">' + comp.toFixed(2) + '</span></div>' +
    buildSparkline(gameId, barColor) +
  '</div>';
}

function buildSignalDetail(sig) {
  if (!sig) return "";
  const sigConfig = SIGNAL_CONFIG[sig.signal] || SIGNAL_CONFIG.HOLD;
  return '<div class="signal-detail">' +
    '<div class="signal-detail-header">Signal Detail</div>' +
    '<div class="signal-detail-grid">' +
      '<div class="signal-detail-cell"><div class="signal-detail-label">Composite</div><div class="signal-detail-value">' + fmtScore(sig.composite) + '</div></div>' +
      '<div class="signal-detail-cell"><div class="signal-detail-label">Odds API</div><div class="signal-detail-value">' + fmtScore(sig.oddsScore) + '</div></div>' +
      '<div class="signal-detail-cell"><div class="signal-detail-label">Confidence</div><div class="signal-detail-value">' + (sig.confidence != null ? Math.round(sig.confidence * 100) + "%" : "&mdash;") + '</div></div>' +
      '<div class="signal-detail-cell"><div class="signal-detail-label">Tier</div><div class="signal-detail-value ' + sigConfig.cls + '">' + sigConfig.label + '</div></div>' +
    '</div>' +
  '</div>';
}

function buildGameCard(g) {
  const sig = state.signals[g.gameId];
  const sigConfig = sig ? (SIGNAL_CONFIG[sig.signal] || SIGNAL_CONFIG.HOLD) : null;
  const hasPrice = g.getIn != null;

  let cardCls = "game-card";
  if (sigConfig) cardCls += " " + sigConfig.card;
  if (state.activeFilter) {
    let show = true;
    if (state.activeFilter === "priced") show = hasPrice;
    else if (state.activeFilter === "aggressive") show = sig && (sig.signal === "GET_AGGRESSIVE" || sig.signal === "LEAN_IN");
    else if (state.activeFilter === "caution") show = sig && (sig.signal === "WATCH" || sig.signal === "BACK_OFF");
    if (!show) cardCls += " filtered-out";
  }

  const parts = (g.game || "TBD vs TBD").split(/\s+vs\s+/i);
  const team1 = parts[0] || "TBD";
  const team2 = parts[1] || "TBD";

  const gt = new Date(g.gameTime);
  const timeStr = gt.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }) +
    " " + gt.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

  let signalBadge = '<span class="badge badge-pending">AWAITING DATA</span>';
  if (sigConfig) signalBadge = '<span class="badge ' + sigConfig.badge + '">' + sigConfig.label + "</span>";

  let tvBadge = g.isNationalTV ? ' <span class="badge badge-tv">NAT\'L TV</span>' : "";

  let ticketHTML;
  if (hasPrice) {
    ticketHTML = '<div class="ticket-block">' +
      '<div class="ticket-header"><span class="ticket-source">SECONDARY MKT</span></div>' +
      '<div class="metrics-grid">' +
        '<div class="metric-cell"><div class="metric-label">GET-IN</div><div class="metric-value">' + fmtPrice(g.getIn) + '</div><div class="metric-sub">lowest</div></div>' +
        '<div class="metric-cell"><div class="metric-label">AVG LISTING</div><div class="metric-value">' + fmtPrice(g.avgListing) + '</div><div class="metric-sub">average</div></div>' +
        '<div class="metric-cell"><div class="metric-label">LISTINGS</div><div class="metric-value">' + (g.listingCount != null ? g.listingCount : "&mdash;") + '</div><div class="metric-sub">available</div></div>' +
        '<div class="metric-cell"><div class="metric-label">WIN PROB</div><div class="metric-value">' + fmtPct(g.homeProbability) + '</div><div class="metric-sub">kalshi</div></div>' +
      "</div>" +
      '<div class="aggression-bar"><span class="aggression-label">SIGNAL</span>' +
        '<span class="aggression-signal ' + (sigConfig ? sigConfig.cls : "sig-pending") + '">' + (sigConfig ? sigConfig.label : "AWAITING DATA") + "</span>" +
        '<span class="aggression-reason">' + (sig && sig.narrative ? sig.narrative.substring(0, 60) : "") + "</span>" +
      "</div>" +
    "</div>";
  } else {
    ticketHTML = '<div class="ticket-block">' +
      '<div class="ticket-header"><span class="ticket-source">SECONDARY MKT</span></div>' +
      '<div class="metrics-grid">' +
        '<div class="metric-cell"><div class="metric-label">GET-IN</div><div class="metric-value pending">&mdash;</div><div class="metric-sub">pending</div></div>' +
        '<div class="metric-cell"><div class="metric-label">AVG LISTING</div><div class="metric-value pending">&mdash;</div><div class="metric-sub">pending</div></div>' +
        '<div class="metric-cell"><div class="metric-label">LISTINGS</div><div class="metric-value pending">&mdash;</div><div class="metric-sub">pending</div></div>' +
        '<div class="metric-cell"><div class="metric-label">WIN PROB</div><div class="metric-value pending">&mdash;</div><div class="metric-sub">pending</div></div>' +
      "</div>" +
      '<div class="aggression-bar"><span class="aggression-label">SIGNAL</span><span class="aggression-signal sig-pending">AWAITING DATA</span></div>' +
    "</div>";
  }

  const signalDetailHTML = buildSignalDetail(sig);

  const card = document.createElement("div");
  card.id = "card-" + g.gameId;
  card.className = cardCls;
  card.innerHTML =
    '<div class="card-top">' +
      '<span class="game-time">' + timeStr + "</span>" +
      '<span class="game-round-tag">' + fmtMinutes(g.minutesToGame) + "</span>" +
    "</div>" +
    '<div class="matchup-line">' +
      '<span class="team' + (team1.includes("TBD") ? " tbd-team" : "") + '">' + team1 + "</span>" +
      '<span class="vs-sep">VS</span>' +
      '<span class="team' + (team2.includes("TBD") ? " tbd-team" : "") + '">' + team2 + "</span>" +
    "</div>" +
    '<div class="status-badges">' + signalBadge + tvBadge + "</div>" +
    buildCardBars(sig, g.gameId) +
    ticketHTML +
    signalDetailHTML;
  return card;
}

function rerenderCard(id) {
  const el = document.getElementById("card-" + id);
  const g = state.games[id];
  if (el && g) el.replaceWith(buildGameCard(g));
}

function switchTab(key) {
  clearSignalFilter();
  state.activeTab = key;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  const tabs = document.querySelectorAll(".tab");
  tabs.forEach(t => {
    if (key === "__all" && t.textContent.startsWith("ALL")) t.classList.add("active");
    else if (key === "__signals" && t.textContent.startsWith("SIGNALS")) t.classList.add("active");
    else if (key === "__sessions" && t.textContent.startsWith("SESSIONS")) t.classList.add("active");
    else if (key === "__hiw" && t.textContent === "HOW IT WORKS") t.classList.add("active");
    else if (t.dataset.tabKey === key) t.classList.add("active");
  });
  const panel = document.getElementById("panel-" + key);
  if (panel) panel.classList.add("active");

  // Initialize HOW IT WORKS interactive elements after panel is visible
  if (key === "__hiw") {
    initHowItWorks();
  }
}

function updateSummary() {
  const games = Object.values(state.games);
  const sigs = state.signals;
  document.getElementById("sum-total").textContent = games.length;
  document.getElementById("sum-priced").textContent = games.filter(g => g.getIn != null).length;
  document.getElementById("games-count").textContent = games.length + " games tracked";

  let aggressive = 0, caution = 0;
  Object.values(sigs).forEach(s => {
    if (s.signal === "GET_AGGRESSIVE" || s.signal === "LEAN_IN") aggressive++;
    if (s.signal === "WATCH" || s.signal === "BACK_OFF") caution++;
  });
  document.getElementById("sum-aggressive").textContent = aggressive;
  document.getElementById("sum-caution").textContent = caution;
}

// ── SIGNALS leaderboard ──
function extractSeeds(gameName) {
  const m = gameName.match(/\((\d+)\)/g);
  if (m && m.length >= 2) return m[0] + " vs " + m[1];
  return "";
}

function shortMatchup(gameName) {
  const parts = (gameName || "TBD vs TBD").split(/\s+vs\s+/i);
  const strip = s => s.replace(/^\(\d+\)\s*/, '').trim();
  const t1 = strip(parts[0] || "TBD");
  const t2 = strip(parts[1] || "TBD");
  return t1 + " vs " + t2;
}

function shortTime(gameTime) {
  const d = new Date(gameTime);
  return d.toLocaleDateString("en-US", { weekday: "short", timeZone: "America/New_York" }) + " " +
    d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" }).replace(" ", "").toLowerCase();
}

function buildSignalRow(g, sig) {
  const sigConfig = sig ? (SIGNAL_CONFIG[sig.signal] || SIGNAL_CONFIG.HOLD) : null;
  const comp = sig ? (sig.composite || 0) : 0;
  const barColor = sig ? (COMPOSITE_COLORS[sig.signal] || "#444") : "#444";
  const pct = Math.min(Math.max(comp * 100, 0), 100);
  const badge = sigConfig
    ? '<span class="badge ' + sigConfig.badge + '">' + sigConfig.label + '</span>'
    : '<span class="badge badge-pending">PENDING</span>';
  return '<div class="sig-row-group" id="sig-group-' + g.gameId + '">' +
    '<div class="sig-row" onclick="toggleSigExpand(\'' + g.gameId + '\')">' +
      '<span class="sig-row-seed">' + extractSeeds(g.game) + '</span>' +
      '<span class="sig-row-matchup">' + shortMatchup(g.game) + '</span>' +
      '<span class="sig-row-time">' + shortTime(g.gameTime) + '</span>' +
      '<span class="sig-row-bar-wrap"><span class="sig-row-bar-track"><span class="sig-row-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></span></span><span class="sig-row-score" style="color:' + barColor + '">' + comp.toFixed(2) + '</span></span>' +
      '<span class="sig-row-badge">' + badge + '</span>' +
    '</div>' +
  '</div>';
}

function buildSigExpandedPanel(gameId) {
  const g = state.games[gameId];
  const sig = state.signals[gameId];
  if (!g) return "";
  const sigConfig = sig ? (SIGNAL_CONFIG[sig.signal] || SIGNAL_CONFIG.HOLD) : null;
  const barColor = sig ? (COMPOSITE_COLORS[sig.signal] || "#444") : "#444";
  const comp = sig ? (sig.composite || 0) : 0;

  const gt = new Date(g.gameTime);
  const timeStr = gt.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", timeZone: "America/New_York" }) +
    " " + gt.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" });

  const badge = sigConfig
    ? '<span class="badge ' + sigConfig.badge + '">' + sigConfig.label + '</span>'
    : '<span class="badge badge-pending">AWAITING DATA</span>';

  // Score breakdown bars
  const oddsVal = sig && sig.oddsScore != null ? sig.oddsScore : 0;
  const ctxVal = sig && sig.contextScore != null ? sig.contextScore : 0;
  const maxScore = Math.max(Math.abs(oddsVal), Math.abs(ctxVal), 0.01);
  const oddsPct = Math.min((Math.abs(oddsVal) / 1.0) * 100, 100);
  const ctxPct = Math.min((Math.abs(ctxVal) / 1.0) * 100, 100);

  const confStr = sig && sig.confidence != null ? Math.round(sig.confidence * 100) + "%" : "&mdash;";
  const narrative = sig && sig.narrative ? sig.narrative : "No narrative available";

  return '<div class="sig-expanded">' +
    '<div class="sig-exp-matchup">' + (g.game || "TBD vs TBD") + '</div>' +
    '<div class="sig-exp-meta">' + timeStr + '</div>' +
    '<div class="sig-exp-badge-row">' + badge + '<span style="font-family:var(--font-mono);font-size:13px;font-weight:600;color:' + barColor + '">' + comp.toFixed(2) + '</span></div>' +
    '<div class="sig-exp-sparkline">' + buildSparkline(gameId, barColor) + '</div>' +
    '<div class="sig-exp-scores">' +
      '<div class="sig-exp-score-row"><span class="sig-exp-score-label">Odds</span><div class="sig-exp-score-track"><div class="sig-exp-score-fill" style="width:' + oddsPct.toFixed(0) + '%;background:var(--teal)"></div></div><span class="sig-exp-score-val">' + fmtScore(sig ? sig.oddsScore : null) + '</span></div>' +
      '<div class="sig-exp-score-row"><span class="sig-exp-score-label">Context</span><div class="sig-exp-score-track"><div class="sig-exp-score-fill" style="width:' + ctxPct.toFixed(0) + '%;background:#8888ff"></div></div><span class="sig-exp-score-val">' + fmtScore(sig ? sig.contextScore : null) + '</span></div>' +
    '</div>' +
    '<div class="sig-exp-conf">Confidence: <strong>' + confStr + '</strong></div>' +
    '<div class="sig-exp-narrative">' + narrative + '</div>' +
    '<div class="sig-exp-actions"><button class="btn btn-primary" onclick="event.stopPropagation();navigateToCard(\'' + gameId + '\')">VIEW IN DASHBOARD</button></div>' +
  '</div>';
}

let _sigExpandedId = null;

function toggleSigExpand(gameId) {
  const prevGroup = _sigExpandedId ? document.getElementById("sig-group-" + _sigExpandedId) : null;

  // Collapse previous
  if (prevGroup) {
    prevGroup.classList.remove("sig-open");
    const prevPanel = prevGroup.querySelector(".sig-expanded");
    if (prevPanel) prevPanel.remove();
  }

  // If clicking the same row, just collapse
  if (_sigExpandedId === gameId) {
    _sigExpandedId = null;
    return;
  }

  // Expand new
  _sigExpandedId = gameId;
  const group = document.getElementById("sig-group-" + gameId);
  if (!group) return;
  group.classList.add("sig-open");
  group.insertAdjacentHTML("beforeend", buildSigExpandedPanel(gameId));
}

// Signals panel state
const _sigPanelState = { subTab: "act", sortAsc: false };

function buildSignalsPanel() {
  const games = Object.values(state.games);
  const act = [], caution = [];

  games.forEach(g => {
    const sig = state.signals[g.gameId];
    if (!sig) return;
    const entry = { g, sig, comp: sig.composite || 0 };
    if (sig.signal === "GET_AGGRESSIVE" || sig.signal === "LEAN_IN") act.push(entry);
    else if (sig.signal === "WATCH" || sig.signal === "BACK_OFF") caution.push(entry);
  });

  const isAct = _sigPanelState.subTab === "act";
  const sortAsc = _sigPanelState.sortAsc;

  return '<div class="signals-panel">' +
    '<div class="sig-panel-header">' +
      '<span class="sig-pill' + (isAct ? ' pill-active' : '') + '" onclick="switchSigSubTab(\'act\')">LEAN IN / GET AGGRESSIVE <span class="pill-badge">' + act.length + '</span></span>' +
      '<span class="sig-pill' + (!isAct ? ' pill-active' : '') + '" onclick="switchSigSubTab(\'caution\')">WATCH / BACK OFF <span class="pill-badge">' + caution.length + '</span></span>' +
      '<span class="sig-sort-controls">' +
        '<button class="sig-sort-btn' + (sortAsc ? ' sort-active' : '') + '" onclick="toggleSigSort(true)">DATE &uarr;</button>' +
        '<button class="sig-sort-btn' + (!sortAsc ? ' sort-active' : '') + '" onclick="toggleSigSort(false)">DATE &darr;</button>' +
      '</span>' +
    '</div>' +
    '<div class="sig-section" id="sig-rows-container">' +
      renderSigRows(isAct ? act : caution, sortAsc) +
    '</div>' +
  '</div>';
}

function renderSigRows(entries, sortAsc) {
  if (entries.length === 0) {
    return '<div class="sig-empty">No active signals in this category.</div>';
  }
  const sorted = entries.slice().sort((a, b) => {
    const ta = new Date(a.g.gameTime).getTime();
    const tb = new Date(b.g.gameTime).getTime();
    return sortAsc ? ta - tb : tb - ta;
  });
  return sorted.map(e => buildSignalRow(e.g, e.sig)).join("");
}

function switchSigSubTab(tab) {
  _sigPanelState.subTab = tab;
  const panel = document.getElementById("panel-__signals");
  if (panel) panel.innerHTML = buildSignalsPanel();
}

function toggleSigSort(asc) {
  _sigPanelState.sortAsc = asc;
  const panel = document.getElementById("panel-__signals");
  if (panel) panel.innerHTML = buildSignalsPanel();
}

function navigateToCard(gameId) {
  const g = state.games[gameId];
  if (!g) return;
  const dateKey = getDateKey(g.gameTime);
  // Check if this date group exists as a tab
  const dateGroups = getDateGroups();
  const hasTab = dateGroups.some(([label]) => label === dateKey);
  if (hasTab) {
    switchTab(dateKey);
  } else {
    switchTab("__all");
  }
  // Scroll to card after tab switch
  requestAnimationFrame(() => {
    const card = document.getElementById("card-" + gameId);
    if (card) {
      card.scrollIntoView({ behavior: "smooth", block: "center" });
      card.style.outline = "2px solid var(--teal)";
      setTimeout(() => { card.style.outline = ""; }, 2000);
    }
  });
}

// ── SESSIONS ──
const UPSET_PROB_TABLE = {
  '1_16': 0.01, '16_1': 0.01, '2_15': 0.06, '15_2': 0.06,
  '3_14': 0.15, '14_3': 0.15, '4_13': 0.21, '13_4': 0.21,
  '5_12': 0.35, '12_5': 0.35, '6_11': 0.38, '11_6': 0.38,
  '7_10': 0.40, '10_7': 0.40, '8_9': 0.49, '9_8': 0.49,
};

function parseSeedNum(gameName) {
  const m = (gameName || "").match(/\((\d+)\)/g);
  if (m && m.length >= 2) return [parseInt(m[0].replace(/[()]/g,'')), parseInt(m[1].replace(/[()]/g,''))];
  return [null, null];
}

function getUpsetProb(seed1, seed2) {
  if (seed1 == null || seed2 == null) return 0.25;
  const key = seed1 + '_' + seed2;
  return UPSET_PROB_TABLE[key] ?? 0.25;
}

function getESTDate(d) {
  return new Date(d).toLocaleDateString("en-US", { year: "numeric", month: "2-digit", day: "2-digit", timeZone: "America/New_York" });
}

function getESTHour(d) {
  return parseInt(new Date(d).toLocaleTimeString("en-US", { hour: "numeric", hour12: false, timeZone: "America/New_York" }), 10);
}

function tierForComposite(c) {
  if (c >= 0.82) return 'GET_AGGRESSIVE';
  if (c >= 0.68) return 'LEAN_IN';
  if (c >= 0.45) return 'HOLD';
  if (c >= 0.30) return 'WATCH';
  return 'BACK_OFF';
}

function sessionCardClass(tier) {
  const map = { GET_AGGRESSIVE: 'sess-aggressive', LEAN_IN: 'sess-lean', HOLD: 'sess-hold', WATCH: 'sess-watch', BACK_OFF: 'sess-backoff' };
  return map[tier] || '';
}

function buildSessionGroups(games, signals) {
  const PRE_SWEET16 = ['First Four', 'First Round', 'Second Round'];
  const eligible = games.filter(g => {
    const t = g.tournament || '';
    return PRE_SWEET16.some(r => t.includes(r));
  }).filter(g => g.venueName);

  // Group by venue + EST date
  const buckets = {};
  eligible.forEach(g => {
    const dateStr = getESTDate(g.gameTime);
    const key = g.venueName + '|' + dateStr;
    if (!buckets[key]) buckets[key] = [];
    buckets[key].push(g);
  });

  // Split each bucket into sessions (games within 3h of each other)
  const sessions = [];
  Object.values(buckets).forEach(bucket => {
    bucket.sort((a, b) => new Date(a.gameTime) - new Date(b.gameTime));
    let current = [bucket[0]];
    for (let i = 1; i < bucket.length; i++) {
      const diff = (new Date(bucket[i].gameTime) - new Date(current[0].gameTime)) / 3600000;
      if (diff <= 3) {
        current.push(bucket[i]);
      } else {
        sessions.push(current);
        current = [bucket[i]];
      }
    }
    sessions.push(current);
  });

  // Build session objects
  return sessions.filter(s => s.length >= 2).map(gameList => {
    const first = gameList[0];
    const times = gameList.map(g => new Date(g.gameTime).getTime());
    const minTime = Math.min(...times);
    const maxTime = Math.max(...times);
    const avgHour = getESTHour(new Date((minTime + maxTime) / 2));
    const label = (avgHour >= 11 && avgHour < 17) ? 'Afternoon Session' : 'Evening Session';

    const timeRange = new Date(minTime).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" }) +
      "\u2013" + new Date(maxTime).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" }) + " EST";

    const dateKey = getDateKey(first.gameTime);
    const dateLong = new Date(first.gameTime).toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric", timeZone: "America/New_York" });

    // Compute combined signal
    const gameData = gameList.map(g => {
      const sig = signals[g.gameId];
      const [s1, s2] = parseSeedNum(g.game);
      const upsetProb = getUpsetProb(s1, s2);
      return { game: g, sig, seeds: [s1, s2], upsetProb, composite: sig ? sig.composite : null };
    });

    const withData = gameData.filter(d => d.composite != null);
    let weightedComposite = 0;
    let combinedTier = 'HOLD';
    let diverging = false;

    if (withData.length >= 2) {
      const totalProb = withData.reduce((s, d) => s + d.upsetProb, 0);
      const weights = withData.map(d => d.upsetProb / totalProb);
      weightedComposite = withData.reduce((s, d, i) => s + d.composite * weights[i], 0);
      combinedTier = tierForComposite(weightedComposite);

      const tiers = new Set(withData.map(d => tierForComposite(d.composite)));
      diverging = tiers.size > 1;

      // Store weights back for display
      withData.forEach((d, i) => { d.weight = weights[i]; });
    } else if (withData.length === 1) {
      weightedComposite = withData[0].composite;
      combinedTier = tierForComposite(weightedComposite);
      withData[0].weight = 1;
    }

    return {
      id: first.venueName + '|' + dateKey + '|' + label,
      venueName: first.venueName,
      venueCity: first.venueCity || '',
      label,
      timeRange,
      dateKey,
      dateLong,
      gameData,
      weightedComposite,
      combinedTier,
      diverging,
      sortTime: minTime,
    };
  });
}

const _sessPanelState = { sortAsc: false };
let _sessExpandedId = null;

function buildSessionsPanel(sessionGroups) {
  const sortAsc = _sessPanelState.sortAsc;
  const sorted = sessionGroups.slice().sort((a, b) => sortAsc ? a.sortTime - b.sortTime : b.sortTime - a.sortTime);

  // Group by date
  const byDate = {};
  sorted.forEach(s => {
    if (!byDate[s.dateLong]) byDate[s.dateLong] = [];
    byDate[s.dateLong].push(s);
  });

  let html = '<div class="sessions-panel">' +
    '<div class="sessions-note">Pre Sweet 16 &middot; Session tickets cover 2 games &middot; Signals are venue-weighted. Sweet 16+ signals are game-specific &mdash; see date tabs.</div>' +
    '<div class="sessions-header">' +
      '<span></span>' +
      '<span class="sig-sort-controls">' +
        '<button class="sig-sort-btn' + (sortAsc ? ' sort-active' : '') + '" onclick="toggleSessSort(true)">DATE &uarr;</button>' +
        '<button class="sig-sort-btn' + (!sortAsc ? ' sort-active' : '') + '" onclick="toggleSessSort(false)">DATE &darr;</button>' +
      '</span>' +
    '</div>';

  Object.entries(byDate).forEach(([dateLong, sessions]) => {
    html += '<div class="sessions-date-hdr"><span>' + dateLong + '</span> &mdash; ' + sessions.length + ' session' + (sessions.length > 1 ? 's' : '') + '</div>';
    html += '<div class="sessions-grid">';
    sessions.forEach(s => {
      html += buildSessionCard(s);
    });
    html += '</div>';
  });

  html += '</div>';
  return html;
}

function buildSessionCard(s) {
  const sigConfig = SIGNAL_CONFIG[s.combinedTier] || SIGNAL_CONFIG.HOLD;
  const barColor = COMPOSITE_COLORS[s.combinedTier] || "#444";
  const pct = Math.min(Math.max(s.weightedComposite * 100, 0), 100);
  const isOpen = _sessExpandedId === s.id;

  let html = '<div class="session-card-wrap" id="sess-wrap-' + cssId(s.id) + '">';
  html += '<div class="session-card ' + sessionCardClass(s.combinedTier) + (isOpen ? ' sess-open' : '') + '" onclick="toggleSessExpand(\'' + escAttr(s.id) + '\')">';
  html += '<div class="session-card-venue">' + esc(s.venueName) + ' &middot; ' + esc(s.venueCity) + '</div>';
  html += '<div class="session-card-label">' + s.label + ' &middot; ' + s.timeRange + '</div>';

  html += '<div class="session-card-signal-row">';
  const hasData = s.gameData.some(d => d.composite != null);
  if (hasData) {
    html += '<span class="badge ' + sigConfig.badge + '">' + sigConfig.label + '</span>';
    html += '<div class="session-card-comp">' +
      '<div class="session-card-comp-track"><div class="session-card-comp-fill" style="width:' + pct.toFixed(0) + '%;background:' + barColor + '"></div></div>' +
      '<span class="session-card-comp-val" style="color:' + barColor + '">' + s.weightedComposite.toFixed(2) + '</span>' +
    '</div>';
  } else {
    html += '<span class="badge badge-pending">AWAITING DATA</span>';
  }
  html += '</div>';

  if (s.diverging) {
    html += '<div class="session-diverge" title="Games in this session have opposing signals. Combined score is upset-probability weighted.">\u26A1 DIVERGING SIGNALS</div>';
  }

  html += '</div>'; // close .session-card

  if (isOpen) {
    html += buildSessionExpanded(s);
  }

  html += '</div>'; // close .session-card-wrap
  return html;
}

function buildSessionExpanded(s) {
  let html = '<div class="session-expanded">';
  s.gameData.forEach(d => {
    const sig = d.sig;
    const sigConfig = sig ? (SIGNAL_CONFIG[sig.signal] || SIGNAL_CONFIG.HOLD) : null;
    const barColor = sig ? (COMPOSITE_COLORS[sig.signal] || "#444") : "#444";
    const comp = d.composite != null ? d.composite : 0;
    const pct = Math.min(Math.max(comp * 100, 0), 100);
    const [s1, s2] = d.seeds;
    const seedStr = (s1 != null && s2 != null) ? '(' + s1 + ') vs (' + s2 + ')' : '';

    const parts = (d.game.game || "TBD vs TBD").split(/\s+vs\s+/i);
    const t1 = (parts[0] || "TBD").replace(/^\(\d+\)\s*/, '').split(/\s+/)[0];
    const t2 = (parts[1] || "TBD").replace(/^\(\d+\)\s*/, '').split(/\s+/)[0];

    const tipTime = new Date(d.game.gameTime).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" }) + " EST";

    const badge = sigConfig
      ? '<span class="badge ' + sigConfig.badge + '">' + sigConfig.label + '</span>'
      : '<span class="badge badge-pending">AWAITING</span>';

    const weightPct = d.weight != null ? Math.round(d.weight * 100) + '% session demand weight' : '';

    html += '<div class="sess-game-row">' +
      '<span class="sess-game-seed">' + seedStr + '</span>' +
      '<span class="sess-game-teams">' + esc(t1) + ' vs ' + esc(t2) + '</span>' +
      '<span class="sess-game-time">' + tipTime + '</span>' +
      '<span class="sess-game-bar-wrap"><span class="sess-game-bar-track"><span class="sess-game-bar-fill" style="width:' + pct.toFixed(0) + '%;background:' + barColor + '"></span></span><span class="sess-game-score" style="color:' + barColor + '">' + (d.composite != null ? comp.toFixed(2) : '—') + '</span></span>' +
      '<span class="sess-game-badge">' + badge + '</span>' +
      '<span class="sess-game-weight">' + weightPct + '</span>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

function cssId(str) { return str.replace(/[^a-zA-Z0-9]/g, '_'); }
function escAttr(str) { return str.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function toggleSessExpand(sessionId) {
  const prevWrap = _sessExpandedId ? document.getElementById("sess-wrap-" + cssId(_sessExpandedId)) : null;
  if (prevWrap) {
    const card = prevWrap.querySelector('.session-card');
    if (card) card.classList.remove('sess-open');
    const exp = prevWrap.querySelector('.session-expanded');
    if (exp) exp.remove();
  }

  if (_sessExpandedId === sessionId) {
    _sessExpandedId = null;
    return;
  }

  _sessExpandedId = sessionId;
  const wrap = document.getElementById("sess-wrap-" + cssId(sessionId));
  if (!wrap) return;
  const card = wrap.querySelector('.session-card');
  if (card) card.classList.add('sess-open');

  // Find the session data — re-compute from current state
  const sessionGroups = buildSessionGroups(Object.values(state.games), state.signals);
  const sess = sessionGroups.find(s => s.id === sessionId);
  if (sess) {
    wrap.insertAdjacentHTML("beforeend", buildSessionExpanded(sess));
  }
}

function toggleSessSort(asc) {
  _sessPanelState.sortAsc = asc;
  const panel = document.getElementById("panel-__sessions");
  if (panel) {
    const sessionGroups = buildSessionGroups(Object.values(state.games), state.signals);
    panel.innerHTML = buildSessionsPanel(sessionGroups);
  }
}

function buildWeightBar(label, pct, color, id) {
  return '<div class="weight-bar-row">' +
    '<span class="weight-bar-label">' + label + '</span>' +
    '<div class="weight-bar-track"><div class="weight-bar-fill" id="' + id + '" style="width:' + pct + '%;background:' + color + '">' + (pct > 5 ? pct + '%' : '') + '</div></div>' +
    '<span class="weight-bar-pct" id="' + id + '-pct">' + pct + '%</span>' +
  '</div>';
}

function buildTierRow(label, dotColor, cls, range) {
  return '<div class="tier-row" data-tier="' + label + '">' +
    '<span class="tier-dot" style="background:' + dotColor + '"></span>' +
    '<span class="tier-label ' + cls + '">' + label + '</span>' +
    '<span class="tier-range">' + range + '</span>' +
  '</div>';
}

function buildRoundConfRow(name, thresh, reason) {

    '<span class="rcr-name">' + name + '</span>' +

function buildUpsetRow(matchup, pct, bonus, rationale) {

function setWeightMode(seatgeekActive) {
  const inactiveBtn = document.getElementById("hiw-toggle-inactive");
  const activeBtn = document.getElementById("hiw-toggle-active");
  if (seatgeekActive) {
    activeBtn.className = "btn btn-primary";
    inactiveBtn.className = "btn btn-ghost";
    animateWeight("hiw-bar-odds", 42);
    animateWeight("hiw-bar-context", 6);
    animateWeight("hiw-bar-upset", 2);
    animateWeight("hiw-bar-tickets", 50);
  } else {
    inactiveBtn.className = "btn btn-primary";
    activeBtn.className = "btn btn-ghost";
    animateWeight("hiw-bar-odds", 83);
    animateWeight("hiw-bar-context", 13);
    animateWeight("hiw-bar-upset", 4);
    animateWeight("hiw-bar-tickets", 0);
  }
}

function animateWeight(id, pct) {
  const bar = document.getElementById(id);
  const pctEl = document.getElementById(id + "-pct");
  if (bar) {
    bar.style.width = pct + "%";
    bar.textContent = pct > 5 ? pct + "%" : "";
  }
  if (pctEl) pctEl.textContent = pct + "%";
}

function updateTierSlider(val) {
  const score = val / 100;
  document.getElementById("hiw-tier-value").textContent = score.toFixed(2);
  let activeTier;
  if (score >= 0.82) activeTier = "GET AGGRESSIVE";
  else if (score >= 0.68) activeTier = "LEAN IN";
  else if (score >= 0.45) activeTier = "HOLD";
  else if (score >= 0.30) activeTier = "WATCH";
  else activeTier = "BACK OFF";

  document.querySelectorAll("#hiw-tiers .tier-row").forEach(row => {
    if (row.dataset.tier === activeTier) {
      row.classList.add("tier-active");
      row.style.background = "var(--bg3)";
      row.style.borderLeft = "3px solid var(--teal)";
    } else {
      row.classList.remove("tier-active");
      row.style.background = "var(--bg4)";
      row.style.borderLeft = "3px solid transparent";
    }
  });
}

function initHowItWorks() {
  // Initialize the tier slider to current value
  const slider = document.getElementById("hiw-tier-slider");
  if (slider) updateTierSlider(slider.value);
}

// ── Alerts ──
function pushAlert(msg, cls, badge) {
  const tray = document.getElementById("alert-tray");
  const el = document.createElement("div");
  el.className = "alert-item " + cls;
  el.innerHTML = '<span class="alert-badge">' + badge + '</span><span class="alert-text">' + msg +
    '</span><span class="alert-time">' + new Date().toLocaleTimeString() +
    '</span><span class="alert-close" onclick="this.parentElement.remove()">&#215;</span>';
  tray.prepend(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 30000);
}

// ── Log ──
function addLog(msg, type) {
  const log = document.getElementById("activity-log");
  const entry = document.createElement("div");
  entry.className = "log-entry";
  entry.innerHTML = '<div class="log-time">' + new Date().toLocaleTimeString() + '</div><div class="log-msg ' + (type || "") + '">' + msg + "</div>";
  log.prepend(entry);
  while (log.children.length > 100) log.removeChild(log.lastChild);
}

function toggleLog() {
  document.getElementById("activity-panel").classList.toggle("open");
  document.getElementById("log-overlay").classList.toggle("open");
}
